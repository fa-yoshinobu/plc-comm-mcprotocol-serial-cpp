    -DMCPROTOCOL_SERIAL_MAX_MULTI_BLOCK_COUNT=8
    -DMCPROTOCOL_SERIAL_MAX_MONITOR_ITEMS=16
    -DMCPROTOCOL_SERIAL_MAX_LOOPBACK_BYTES=64
    -DMCPROTOCOL_SERIAL_ENABLE_RANDOM_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MULTI_BLOCK_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MONITOR_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_HOST_BUFFER_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MODULE_BUFFER_COMMANDS=0
build_src_filter =
    -<*>
    +<src/client.cpp>
    +<src/codec.cpp>
    +<examples/platformio_arduino_async/platformio_arduino_async.cpp>
