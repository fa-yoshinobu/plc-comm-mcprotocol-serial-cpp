; PlatformIO Project Configuration File

[platformio]
src_dir = .

[env]
build_unflags =
    -std=gnu++11
    -std=gnu++14
    -std=gnu++17
    -std=gnu++2a
    -std=gnu++20
build_flags =
    -std=gnu++17
    -fno-exceptions
    -fno-rtti
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
    -Iinclude

[mcprotocol_reduced_feature_profile]
build_flags =
    -DMCPROTOCOL_SERIAL_MAX_REQUEST_FRAME_BYTES=768
    -DMCPROTOCOL_SERIAL_MAX_RESPONSE_FRAME_BYTES=768
    -DMCPROTOCOL_SERIAL_MAX_REQUEST_DATA_BYTES=384
    -DMCPROTOCOL_SERIAL_MAX_RANDOM_ACCESS_ITEMS=16
    -DMCPROTOCOL_SERIAL_MAX_MULTI_BLOCK_COUNT=8
    -DMCPROTOCOL_SERIAL_MAX_MONITOR_ITEMS=16
    -DMCPROTOCOL_SERIAL_MAX_LOOPBACK_BYTES=64
    -DMCPROTOCOL_SERIAL_ENABLE_RANDOM_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MULTI_BLOCK_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MONITOR_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_HOST_BUFFER_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MODULE_BUFFER_COMMANDS=0

[mcprotocol_ultra_minimal_profile]
build_flags =
    -DMCPROTOCOL_SERIAL_MAX_REQUEST_FRAME_BYTES=256
    -DMCPROTOCOL_SERIAL_MAX_RESPONSE_FRAME_BYTES=256
    -DMCPROTOCOL_SERIAL_MAX_REQUEST_DATA_BYTES=128
    -DMCPROTOCOL_SERIAL_MAX_RANDOM_ACCESS_ITEMS=0
    -DMCPROTOCOL_SERIAL_MAX_MULTI_BLOCK_COUNT=0
    -DMCPROTOCOL_SERIAL_MAX_MONITOR_ITEMS=0
    -DMCPROTOCOL_SERIAL_MAX_LOOPBACK_BYTES=0
    -DMCPROTOCOL_SERIAL_ENABLE_RANDOM_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MULTI_BLOCK_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MONITOR_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_HOST_BUFFER_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_MODULE_BUFFER_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_CPU_MODEL_COMMANDS=0
    -DMCPROTOCOL_SERIAL_ENABLE_LOOPBACK_COMMANDS=0

[env:native-example]
platform = native
build_flags =
    ${env.build_flags}
    ${mcprotocol_reduced_feature_profile.build_flags}
build_src_filter =
    -<*>
    +<src/client.cpp>
    +<src/codec.cpp>
    +<examples/mcu_async_batch_read.cpp>

[env:rpipico-arduino-example]
platform = raspberrypi
board = pico
framework = arduino
monitor_speed = 115200
build_flags =
    ${env.build_flags}
    ${mcprotocol_reduced_feature_profile.build_flags}
build_src_filter =
    -<*>
    +<src/client.cpp>
    +<src/codec.cpp>
    +<examples/platformio_rpipico_arduino_async/platformio_rpipico_arduino_async.cpp>

